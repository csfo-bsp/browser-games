<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    h1 { font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; color: #ffd700; }
    .games { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 220px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 32px 24px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: transform 0.15s, border-color 0.15s;
    }
    .card:hover { transform: translateY(-4px); border-color: #ffd700; }
    .card .icon { font-size: 3rem; margin-bottom: 14px; }
    .card h2 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .card p { font-size: 0.8rem; color: #888; }
  </style>
</head>
<body>
  <h1>Browser Games</h1>
  <div class="games">
    <a class="card" href="football.html">
      <div class="icon">⚽</div>
      <h2>Penalty Shootout</h2>
      <p>Shoot against a smart goalkeeper. 5 shots per round.</p>
    </a>
    <a class="card" href="tictactoe.html">
      <div class="icon">⬜</div>
      <h2>Tic Tac Toe</h2>
      <p>Two-player classic. First to three in a row wins.</p>
    </a>
  </div>
</body>
</html>
