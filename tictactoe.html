<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.1rem;
      color: #a8a8b3;
      height: 1.5em;
    }

    #status span {
      color: #eee;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #53d8fb; }

    .cell.win {
      background: #0f3460;
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scoreboard {
      display: flex;
      gap: 32px;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a8a8b3;
    }

    .score-box .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .score-box.x .value { color: #e94560; }
    .score-box.tie .value { color: #a8a8b3; }
    .score-box.o .value { color: #53d8fb; }

    #reset {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }
    #reset:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="status">Turn: <span id="turn">X</span></div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scoreboard">
    <div class="score-box x">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box tie">
      <div class="label">Ties</div>
      <div class="value" id="score-tie">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, over;
    const scores = { X: 0, O: 0, tie: 0 };

    const cells = document.querySelectorAll('.cell');
    const turnEl = document.getElementById('turn');
    const statusEl = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      statusEl.innerHTML = 'Turn: <span id="turn">' + current + '</span>';
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(j => cells[j].classList.add('win'));
            scores[result.winner]++;
            statusEl.innerHTML = '<span>' + result.winner + ' wins!</span>';
          } else {
            scores.tie++;
            statusEl.innerHTML = '<span>It\'s a tie!</span>';
          }
          document.getElementById('score-x').textContent = scores.X;
          document.getElementById('score-o').textContent = scores.O;
          document.getElementById('score-tie').textContent = scores.tie;
        } else {
          current = current === 'X' ? 'O' : 'X';
          statusEl.innerHTML = 'Turn: <span>' + current + '</span>';
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
